  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }

  <body class="h-full bg-night-900 text-white overflow-auto">
    <div id="app" class="h-full w-full"></div>

    <!-- ====================== DATA_SDK CORRIGÉ ====================== -->
    <script>
    window.dataSdk = {
      data: [],
      handler: null,
      lastSyncHash: null,
      pollingInterval: null,

      async init(dataHandler) {
        this.handler = dataHandler;
        console.log('[SDK] Initialisation avec persistance renforcée...');

        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 6000);

          const res = await fetch('/api/store', { signal: controller.signal });
          clearTimeout(timeoutId);

          if (res.ok) {
            const cloudData = await res.json();
            const received = cloudData.success && Array.isArray(cloudData.data) 
              ? cloudData.data 
              : (Array.isArray(cloudData) ? cloudData : []);

            this.data = received;
            this.lastSyncHash = JSON.stringify(this.data);
            console.log(`[SDK] ✅ ${this.data.length} enregistrements chargés depuis Redis`);
          } else {
            console.warn(`[SDK] Cloud HTTP ${res.status} → utilisation du cache mémoire`);
          }
        } catch (e) {
          console.error('[SDK] Erreur Redis:', e);
          console.warn('[ANTI-DATA-LOSS] Conservation des données en mémoire');
        }

        if (this.handler?.onDataChanged) {
          this.handler.onDataChanged(this.data);
        }

        this.startPolling();
        return { isOk: true };
      },

      startPolling() {
        if (this.pollingInterval) clearInterval(this.pollingInterval);
        this.pollingInterval = setInterval(async () => {
          try {
            const res = await fetch('/api/store', { signal: AbortSignal.timeout(5000) });
            if (res.ok) {
              const cloudData = await res.json();
              const received = cloudData.success && Array.isArray(cloudData.data) 
                ? cloudData.data 
                : (Array.isArray(cloudData) ? cloudData : []);

              const cloudHash = JSON.stringify(received);
              if (cloudHash !== this.lastSyncHash) {
                this.data = received;
                this.lastSyncHash = cloudHash;
                console.log('[SDK] 🔄 Sync auto détectée depuis Redis');
                if (this.handler?.onDataChanged) this.handler.onDataChanged(this.data);
              }
            }
          } catch (e) {}
        }, 3000);
      },

      async list() {
        return {
          isOk: true,
          users: this.data.filter(d => d.type === 'user'),
          vehicles: this.data.filter(d => d.type === 'vehicule')
        };
      },

      async create(item) {
        try {
          const newItem = { 
            ...item, 
            __backendId: Date.now().toString() + Math.random().toString(36).substr(2, 8) 
          };
          this.data.push(newItem);
          await this.save();
          return { isOk: true, data: newItem };
        } catch (err) {
          console.error("Erreur create:", err);
          return { isOk: false, error: err.message };
        }
      },

      async update(item) {
        try {
          if (!item?.__backendId) return { isOk: false, error: 'Missing __backendId' };
          const index = this.data.findIndex(d => d.__backendId === item.__backendId);
          if (index === -1) return { isOk: false, error: 'Item not found' };
          this.data[index] = { ...this.data[index], ...item };
          await this.save();
          return { isOk: true, item: this.data[index] };
        } catch (err) {
          console.error("Erreur update:", err);
          return { isOk: false, error: err.message };
        }
      },

      async delete(item) {
        try {
          if (!item?.__backendId) return { isOk: false, error: 'Missing __backendId' };
          const index = this.data.findIndex(d => d.__backendId === item.__backendId);
          if (index === -1) return { isOk: false, error: 'Item not found' };
          this.data.splice(index, 1);
          await this.save();
          return { isOk: true };
        } catch (err) {
          console.error("Erreur delete:", err);
          return { isOk: false, error: err.message };
        }
      },

      async save() {
        try {
          this.lastSyncHash = JSON.stringify(this.data);
          if (this.handler?.onDataChanged) this.handler.onDataChanged(this.data);

          const response = await fetch('/api/store', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: this.data }),
            signal: AbortSignal.timeout(10000)
          });

          if (!response.ok) throw new Error(`Save failed: ${response.status}`);
          console.log('[SDK] ✅ Sauvegarde Redis réussie');
        } catch (err) {
          console.error("❌ Erreur save Redis:", err);
          throw err;
        }
      }
    };
    </script>

    <!-- ====================== SCRIPT PRINCIPAL ====================== -->
    <script>
const defaultConfig = {
  app_title: 'MyTaxi Binchois',
  login_subtitle: 'Gestion de flotte de taxis',
  bg_color: '#0A0F1C',
  surface_color: '#1F2A43',
  text_color: '#E8EAF0',
  primary_color: '#E6B800',
  secondary_color: '#3B4A6B'
};

let APP = {
  currentUser: null,
  currentPage: 'login',
  allData: [],
  users: [],
  vehicles: [],
  toasts: [],
  confirmDialog: null,
  editItem: null,
  _isRestoring: false,
  serviceState: null,
  courseState: null,
  courseEndData: null,
};

function getUsers() { return APP.users; }
function getVehicules() { return APP.vehicles; }
function getCourses() { return APP.allData.filter(d => d.type === 'course'); }
function getNotifications() { return APP.allData.filter(d => d.type === 'notification'); }
function getServiceHistory() { return APP.allData.filter(d => d.type === 'service_history'); }

function generateRandomAvatar(prenom, nom) {
  const colors = ['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#6C5CE7','#A29BFE','#FF7675','#74B9FF','#55EFC4'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const initials = (prenom[0] || '') + (nom[0] || '');
  return `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="${color}"/><text x="50" y="55" font-size="40" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">${initials.toUpperCase()}</text></svg>`;
}

function showToast(msg, type='success') {
  const id = Date.now();
  APP.toasts.push({id, msg, type});
  renderToasts();
  setTimeout(() => { APP.toasts = APP.toasts.filter(t=>t.id!==id); renderToasts(); }, 3500);
}

function renderToasts() {
  let c = document.getElementById('toast-container');
  if (!c) { 
    c = document.createElement('div'); 
    c.id='toast-container'; 
    c.className='fixed bottom-4 right-4 z-50 flex flex-col gap-2'; 
    document.body.appendChild(c); 
  }
  c.innerHTML = APP.toasts.map(t => `
    <div class="toast-in px-5 py-3 rounded-lg shadow-xl text-sm font-medium ${t.type==='error'?'bg-red-600':'bg-emerald-600'} text-white max-w-xs">${t.msg}</div>
  `).join('');
}

// ... (toutes les autres fonctions showConfirm, showDailyRecap, getCommune, formatDT, etc. restent identiques)

async function initApp() {
  if (APP._isRestoring) return;
  APP._isRestoring = true;
  console.log('[Init] Démarrage...');

  await new Promise(r => setTimeout(r, 100)); // petit délai pour que dataSdk soit chargé

  const r = await window.dataSdk.init(dataHandler);
  if (r.isOk) {
    await loadCloudData();
    
    // Restauration session
    const savedSessionID = localStorage.getItem('sessionID');
    if (savedSessionID) {
      try {
        const sessionRes = await fetch(`/api/store?sessionID=${encodeURIComponent(savedSessionID)}`);
        if (sessionRes.ok) {
          const sessionData = await sessionRes.json();
          if (sessionData.success && sessionData.user) {
            APP.currentUser = sessionData.user;
            APP.currentPage = sessionData.user.role === 'admin' ? 'admin-dashboard' : 'chauffeur-main';
          }
        }
      } catch(e) {
        console.error('[Restore] Erreur:', e);
      }
    }
    
    await refreshAppData();
  }

  APP._isRestoring = false;
  render();
}

const dataHandler = {
  onDataChanged(data) {
    APP.allData = data || [];
    APP.users = APP.allData.filter(d => d.type === 'user');
    APP.vehicles = APP.allData.filter(d => d.type === 'vehicule');
    render();
  }
};

async function loadCloudData() {
  const result = await window.dataSdk.list();
  if (result.isOk) {
    APP.users = result.users || [];
    APP.vehicles = result.vehicles || [];
  }
}

async function refreshAppData() {
  const result = await window.dataSdk.list();
  if (result.isOk) {
    APP.users = result.users || [];
    APP.vehicles = result.vehicles || [];
  }
}

function cfg(key) {
  return (window.elementSdk?.config?.[key]) || defaultConfig[key];
}

function render() {
  const app = document.getElementById('app');
  if (!app) return;

  if (!APP.currentUser && APP.currentPage !== 'login') {
    APP.currentPage = 'login';
  }

  // ... (le reste du render avec tous les renderLogin, renderAdminDashboard, renderChauffeurMain, etc.)

  switch(APP.currentPage) {
    case 'login': renderLogin(app); break;
    case 'admin-dashboard': renderAdminDashboard(app); break;
    // ... autres pages
    default: renderLogin(app);
  }
  lucide.createIcons();
}

// IMPORTANT : Lancement immédiat
(async () => {
  await initApp();
})();
    </script>
