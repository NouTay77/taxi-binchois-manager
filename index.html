<!doctype html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTaxi Binchois</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    html, body, #app { height: 100%; margin: 0; padding: 0; }
    body { background: #0A0F1C; color: white; }
    .card { background: #1F2A43; border: 1px solid #3B4A6B; }
  </style>
</head>
<body class="h-full overflow-auto">

  <div id="app" class="h-full w-full"></div>

  <!-- ====================== DATA SDK STABLE ====================== -->
  <script>
  window.dataSdk = {
    data: [],
    handler: null,
    lastSyncHash: null,
    pollingInterval: null,

    async init(dataHandler) {
      this.handler = dataHandler;
      console.log('[SDK] Initialisation...');

      try {
        const res = await fetch('/api/store');
        if (res.ok) {
          const json = await res.json();
          const received = json.success && Array.isArray(json.data) ? json.data : [];
          this.data = received;
          this.lastSyncHash = JSON.stringify(this.data);
          console.log(`[SDK] ${this.data.length} enregistrements chargés`);
        }
      } catch (e) {
        console.warn('[SDK] Redis non accessible');
      }

      if (this.handler) this.handler.onDataChanged(this.data);
      this.startPolling();
      return { isOk: true };
    },

    startPolling() {
      if (this.pollingInterval) clearInterval(this.pollingInterval);
      this.pollingInterval = setInterval(async () => {
        try {
          const res = await fetch('/api/store');
          if (res.ok) {
            const json = await res.json();
            const received = json.success && Array.isArray(json.data) ? json.data : [];
            const hash = JSON.stringify(received);
            if (hash !== this.lastSyncHash) {
              this.data = received;
              this.lastSyncHash = hash;
              if (this.handler) this.handler.onDataChanged(this.data);
            }
          }
        } catch(e) {}
      }, 4000);
    },

    async list() { 
      return { isOk: true, users: this.data.filter(d => d.type === 'user'), vehicles: this.data.filter(d => d.type === 'vehicule') }; 
    },

    async create(item) {
      const newItem = { ...item, __backendId: Date.now().toString(36) + Math.random().toString(36).slice(2) };
      this.data.push(newItem);
      await this.save();
      return { isOk: true, data: newItem };
    },

    async update(item) {
      if (!item?.__backendId) return { isOk: false, error: 'No ID' };
      const idx = this.data.findIndex(x => x.__backendId === item.__backendId);
      if (idx === -1) return { isOk: false, error: 'Not found' };
      this.data[idx] = { ...this.data[idx], ...item };
      await this.save();
      return { isOk: true };
    },

    async save() {
      this.lastSyncHash = JSON.stringify(this.data);
      if (this.handler) this.handler.onDataChanged(this.data);
      await fetch('/api/store', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ data: this.data })
      });
    }
  };
  </script>

  <!-- ====================== MAIN APPLICATION ====================== -->
  <script>
let APP = {
  currentUser: null,
  currentPage: 'login',
  allData: [],
  users: [],
  vehicles: []
};

const dataHandler = {
  onDataChanged(data) {
    APP.allData = data || [];
    APP.users = APP.allData.filter(d => d.type === 'user');
    APP.vehicles = APP.allData.filter(d => d.type === 'vehicule');
    render();
  }
};

async function initApp() {
  document.getElementById('app').innerHTML = `
    <div class="h-full flex items-center justify-center">
      <div class="text-center">
        <div class="w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        <p class="text-yellow-400">Chargement...</p>
      </div>
    </div>`;
  
  await window.dataSdk.init(dataHandler);

  const sessionID = localStorage.getItem('sessionID');
  if (sessionID) {
    try {
      const res = await fetch(`/api/store?sessionID=${sessionID}`);
      if (res.ok) {
        const json = await res.json();
        if (json.success && json.user) APP.currentUser = json.user;
      }
    } catch(e) {}
  }

  if (!APP.currentUser) APP.currentPage = 'login';
  else APP.currentPage = APP.currentUser.role === 'admin' ? 'admin-dashboard' : 'chauffeur-main';

  render();
}

function render() {
  const app = document.getElementById('app');
  if (APP.currentPage === 'login') {
    renderLogin(app);
  } else if (APP.currentPage === 'admin-dashboard') {
    renderAdminDashboard(app);
  }
}

function renderLogin(app) {
  app.innerHTML = `
    <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-[#0A0F1C] to-[#1F2A43]">
      <div class="w-full max-w-md card rounded-3xl p-8">
        <h1 class="font-display text-4xl font-bold text-center mb-2 text-yellow-400">MyTaxi Binchois</h1>
        <p class="text-center text-gray-400 mb-8">Gestion de flotte</p>
        
        <input id="email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-[#0A0F1C] mb-4">
        <input id="password" type="password" placeholder="Mot de passe" class="w-full p-4 rounded-2xl bg-[#0A0F1C] mb-6">
        
        <button onclick="performLogin()" class="w-full py-4 bg-yellow-400 hover:bg-yellow-300 text-black font-bold rounded-2xl transition">
          Se connecter
        </button>
      </div>
    </div>`;
}

async function performLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const user = APP.users.find(u => u.email === email && u.password === password);
  
  if (user) {
    APP.currentUser = user;
    localStorage.setItem('sessionID', 'session-' + Date.now());
    APP.currentPage = user.role === 'admin' ? 'admin-dashboard' : 'chauffeur-main';
    render();
  } else {
    alert("Identifiants incorrects");
  }
}

function renderAdminDashboard(app) {
  app.innerHTML = `
    <div class="p-8">
      <h1 class="text-3xl font-bold mb-2">Bienvenue ${APP.currentUser?.prenom || 'Principal'}</h1>
      <p class="text-gray-400 mb-8">Page : admin-dashboard</p>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="card p-6 rounded-3xl">
          <h3 class="text-yellow-400">Chauffeurs</h3>
          <p class="text-4xl font-bold mt-2">${APP.users.length}</p>
        </div>
        <div class="card p-6 rounded-3xl">
          <h3 class="text-yellow-400">Véhicules</h3>
          <p class="text-4xl font-bold mt-2">${APP.vehicles.length}</p>
        </div>
        <div class="card p-6 rounded-3xl">
          <button onclick="addTestData()" class="w-full py-3 bg-yellow-400 text-black rounded-2xl font-semibold">
            Ajouter des données de test
          </button>
        </div>
      </div>
    </div>`;
}

async function addTestData() {
  await window.dataSdk.create({ type: 'user', email: 'admin@test.com', password: '1234', role: 'admin', prenom: 'Principal', nom: 'Admin' });
  await window.dataSdk.create({ type: 'vehicule', immatriculation: '1-ABC-999', marque: 'Mercedes', modele: 'Vito' });
  alert("Données de test ajoutées ! Actualise la page.");
  render();
}

// Lancement
window.onload = initApp;
  </script>
</body>
</html>
